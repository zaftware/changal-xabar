<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Changal 24</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#17212b;color:#d1dbe8;max-width:600px;margin:0 auto;padding:0 10px 40px}
a{color:#71afe5;text-decoration:none}
a:hover{text-decoration:underline}

header{display:flex;align-items:center;justify-content:space-between;padding:16px 2px 12px;margin-bottom:6px}
header h1{font-size:17px;font-weight:700;color:#fff}
header .tg-link{font-size:13px;color:#71afe5}

/* message bubble – mirrors Telegram dark theme */
.msg{background:#1e2c3a;border-radius:12px;padding:12px 14px;margin-bottom:6px;font-size:14.5px;line-height:1.55}
.msg-head{margin-bottom:6px}
.msg-head .src{color:#71afe5;font-weight:500}
.msg-body{color:#d1dbe8;white-space:pre-wrap;word-break:break-word}
.msg-foot{margin-top:8px;font-size:12px;color:#71afe5;display:flex;align-items:center;gap:10px}
.msg-foot .date{color:#6d7f8e;margin-left:auto}
.empty{color:#6d7f8e;font-size:14px;padding:20px 4px}

/* admin */
#admin-bar{padding:8px 0 6px;display:flex;gap:8px;margin-bottom:2px}
#admin-bar input{flex:1;background:#1e2c3a;color:#d1dbe8;border:1px solid #2b3f52;border-radius:8px;padding:8px 10px;font-size:13px}
#admin-bar button{background:#2b3f52;color:#71afe5;border:1px solid #2b3f52;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;white-space:nowrap}
#admin-bar button:hover{background:#354d63}

#admin-panel{display:none;margin-bottom:14px;border:1px solid #2b3f52;border-radius:10px;padding:12px 14px;background:#1a2533}
#admin-panel .adm-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
#admin-panel button{background:#2b3f52;color:#d1dbe8;border:1px solid #364f65;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:13px}
#admin-panel button:hover{background:#354d63}
#admin-panel button.primary{color:#71afe5}
#custom-text{width:100%;background:#131e28;color:#d1dbe8;border:1px solid #2b3f52;border-radius:8px;padding:9px 10px;font-size:13px;resize:vertical;margin-bottom:7px;font-family:inherit}
#status{font-size:12px;color:#6d7f8e;min-height:16px;margin:4px 0 8px}

.p-section{font-size:12px;color:#6d7f8e;letter-spacing:.4px;text-transform:uppercase;margin:8px 0 6px}
.pending-row{background:#1e2c3a;border-radius:8px;padding:10px 12px;margin-bottom:5px;display:flex;gap:10px;align-items:center}
.pending-row .pr-info{flex:1;min-width:0}
.pending-row .pr-title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;color:#d1dbe8}
.pending-row .pr-meta{font-size:11px;color:#6d7f8e}
.pending-row .pub-btn{flex-shrink:0;background:#213040;color:#71afe5;border:1px solid #2b4560;border-radius:7px;padding:6px 11px;cursor:pointer;font-size:12px;white-space:nowrap}
.pending-row .pub-btn:hover{background:#28405a}
.pending-row .pub-btn:disabled{opacity:.45;cursor:default}
</style>
</head>
<body>

<header>
  <h1>🦞 Changal 24</h1>
  <a class="tg-link" href="https://t.me/changal_24" target="_blank">Telegram kanalga →</a>
</header>

<div id="admin-bar">
  <input id="token" type="password" placeholder="Admin token"/>
  <button onclick="showAdmin()">Admin</button>
</div>

<div id="admin-panel">
  <div class="adm-row">
    <button class="primary" onclick="publishNow()">Publish top post</button>
    <button onclick="loadPending()">Refresh</button>
  </div>
  <textarea id="custom-text" rows="3" placeholder="Kanalga custom post..."></textarea>
  <button onclick="postCustom()">Post custom</button>
  <div id="status"></div>
  <div class="p-section">Pending queue</div>
  <div id="pending-list"><div class="empty">Yuklanmoqda...</div></div>
</div>

<div id="list"><div class="empty">Yuklanmoqda...</div></div>

<script>
const SOURCE_MAP = {
  'reddit.com':'Reddit','news.ycombinator.com':'Hacker News','github.com':'GitHub',
  'lesswrong.com':'LessWrong','x.com':'X','twitter.com':'X','youtube.com':'YouTube',
  'youtu.be':'YouTube','arxiv.org':'arXiv','openai.com':'OpenAI','anthropic.com':'Anthropic',
  'robservatory.com':'Robservatory','windowslatest.com':'Windows Latest',
  'replicate.com':'Replicate','take.surf':'take.surf','ntik.me':'Nick Tikhonov',
};

function srcName(url) {
  try {
    const host = new URL(url).hostname.replace(/^www\./, '');
    if (SOURCE_MAP[host]) return SOURCE_MAP[host];
    const parts = host.split('.');
    const base = parts.length >= 2 ? parts.at(-2) : host;
    return base.split(/[-._]+/).map(p => p[0].toUpperCase() + p.slice(1)).join(' ');
  } catch { return 'Manba'; }
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('ru', {day:'2-digit',month:'short'});
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function adminHeaders() {
  return {'content-type':'application/json','x-admin-token':document.getElementById('token').value.trim()};
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }

// Feed
fetch('/api/news').then(r=>r.json()).then(rows=>{
  const el = document.getElementById('list');
  if (!rows.length) { el.innerHTML='<div class="empty">Hozircha yangiliklar yo\'q</div>'; return; }
  el.innerHTML = rows.map(x => {
    const src = srcName(x.url || x.source_url || '');
    const title = esc(x.title_uz || x.title || '');
    const tldr = esc(x.tldr_uz || '').trim();
    const date = fmtDate(x.published_at);
    return `<div class="msg">
  <div class="msg-head"><span class="src"><a href="${esc(x.url)}" target="_blank">${esc(src)}</a></span>: ${title}</div>
  <div class="msg-body">${tldr}</div>
  <div class="msg-foot"><a href="https://t.me/changal_24" target="_blank">Changal24</a>${date ? `<span class="date">${date}</span>` : ''}</div>
</div>`;
  }).join('');
}).catch(()=>{
  document.getElementById('list').innerHTML='<div class="empty">Yuklanmadi</div>';
});

// Admin
async function showAdmin() {
  const r = await fetch('/api/admin/pending',{headers:adminHeaders()});
  if (r.status===401){setStatus("Noto'g'ri token");return;}
  if (!r.ok){setStatus('Xato '+r.status);return;}
  document.getElementById('admin-panel').style.display='block';
  renderPending(await r.json());
}
async function loadPending() {
  const r = await fetch('/api/admin/pending',{headers:adminHeaders()});
  if (r.ok) renderPending(await r.json());
}
function renderPending(rows) {
  const el = document.getElementById('pending-list');
  if (!rows.length){el.innerHTML='<div class="empty">Navbat bo\'sh</div>';return;}
  el.innerHTML = rows.map(x=>`<div class="pending-row" id="pc-${x.id}">
  <div class="pr-info">
    <div class="pr-title" title="${esc(x.title||'')}">${esc(x.title||'')}</div>
    <div class="pr-meta">${esc(srcName(x.url||x.source_url||''))} · score ${Math.round(x.score||0)}</div>
  </div>
  <button class="pub-btn" onclick="publishPost(${x.id},this)">Publish</button>
</div>`).join('');
}
async function publishPost(id, btn) {
  btn.disabled=true; btn.textContent='...'; setStatus('Publishing #'+id+'...');
  const r = await fetch('/api/publish-post',{method:'POST',headers:adminHeaders(),body:JSON.stringify({id})});
  const j = await r.json().catch(()=>({}));
  if (r.ok){setStatus('OK: '+(j.output||'published')); document.getElementById('pc-'+id)?.remove();}
  else{setStatus('ERR: '+(j.error||r.status)); btn.disabled=false; btn.textContent='Publish';}
}
async function publishNow() {
  setStatus('Publishing...');
  const r = await fetch('/api/publish-now',{method:'POST',headers:adminHeaders()});
  const j = await r.json().catch(()=>({}));
  setStatus(r.ok?'OK: '+(j.output||'published'):'ERR: '+(j.error||r.status));
  if (r.ok) loadPending();
}
async function postCustom() {
  const text = document.getElementById('custom-text').value.trim();
  if (!text) return;
  setStatus('Sending...');
  const r = await fetch('/api/post-custom',{method:'POST',headers:adminHeaders(),body:JSON.stringify({text})});
  const j = await r.json().catch(()=>({}));
  setStatus(r.ok?'OK: sent':'ERR: '+(j.error||r.status));
}
</script>
</body>
</html>
